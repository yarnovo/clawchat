# Promptfoo test configuration for claw-forge create pipeline
# Tests the LLM prompt generation quality for skill creation

description: "Claw Forge - Skill Creation Quality Tests"

prompts:
  - |
    你是一个专业的AI视频创意总监。根据给定的技能描述，生成一段5秒宣传视频的创意方案。

    输出 JSON 格式：
    {
      "tagline": "一句话卖点（不超过15字）",
      "first_frame_prompt": "Seedream首帧图片提示词",
      "video_prompt": "Seedance视频提示词",
      "style": "写实|动画|扁平|赛博朋克|简约科技"
    }

    技能名称：{{skill_name}}
    技能描述：{{skill_description}}

providers:
  - id: openai:chat:doubao-seed-2-0-pro-260215
    config:
      apiHost: ark.cn-beijing.volces.com/api/v3
      temperature: 0.8
      response_format:
        type: json_object

tests:
  # Test 1: Simple tool skill (weather query)
  - vars:
      skill_name: weather-query
      skill_description: "查询全球城市天气信息，支持当前天气和未来7天预报，返回温度、湿度、风速等数据"
    assert:
      - type: is-json
      - type: llm-rubric
        value: >
          The response is a valid JSON object with tagline (under 15 chars),
          first_frame_prompt, video_prompt (containing motion description),
          and style fields. Quality score should be >= 0.75.

  # Test 2: Data analysis skill
  - vars:
      skill_name: csv-analyzer
      skill_description: "分析 CSV 数据文件，自动识别数据类型，生成统计摘要、可视化图表和洞察报告"
    assert:
      - type: is-json
      - type: llm-rubric
        value: >
          The response is a valid JSON with all 4 required fields.
          The video_prompt should describe data visualization or analytics-related
          imagery with clear motion. Quality score should be >= 0.75.

  # Test 3: Edge case (very short description)
  - vars:
      skill_name: ping
      skill_description: "Ping"
    assert:
      - type: is-json
      - type: llm-rubric
        value: >
          Even with a minimal description, the response should be valid JSON
          with all 4 required fields and reasonable creative content.
          Quality score should be >= 0.5.
