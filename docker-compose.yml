# ClawChat 本地开发环境
# 所有服务容器化，源码挂载 + 热重载
# 启动: docker compose up -d
# 日志: docker compose logs -f im-server

services:
  # ---- 基础设施 ----
  postgres:
    image: postgres:17
    container_name: clawchat-postgres
    environment:
      POSTGRES_USER: clawchat
      POSTGRES_PASSWORD: clawchat
      POSTGRES_DB: clawchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawchat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: clawchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- 后端服务（dev 模式：源码挂载 + tsx watch 热重载）----
  im-server:
    build: ./im-server
    container_name: clawchat-im-server
    restart: unless-stopped
    command: sh -c "npx prisma db push && npx tsx watch src/index.ts"
    environment:
      DATABASE_URL: postgresql://clawchat:clawchat@postgres:5432/clawchat
      REDIS_URL: redis://redis:6379
      JWT_SECRET: clawchat-dev-secret
      AGENT_SERVER_URL: http://agent-server:3004
    ports:
      - "3000:3000"
    volumes:
      - ./im-server/src:/app/src
      - ./im-server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-server:
    build: ./agent-server
    container_name: clawchat-agent-server
    restart: unless-stopped
    command: sh -c "npx prisma db push && npx tsx watch src/index.ts"
    environment:
      DATABASE_URL: postgresql://clawchat:clawchat@postgres:5432/clawchat_agent
      IM_SERVER_URL: http://im-server:3000
      OPENCLAW_SERVER_URL: http://openclaw-server:3003
      NANOCLAW_SERVER_URL: http://nanoclaw-server:3005
      IRONCLAW_SERVER_URL: http://ironclaw-server:3006
      JWT_SECRET: clawchat-dev-secret
      PORT: "3004"
    ports:
      - "3004:3004"
    volumes:
      - ./agent-server/src:/app/src
      - ./agent-server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy

  container-server:
    build: ./container-server
    container_name: clawchat-container-server
    restart: unless-stopped
    command: npx tsx watch src/index.ts
    environment:
      PORT: "3002"
    ports:
      - "3002:3002"
    volumes:
      - ./container-server/src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock

  openclaw-server:
    build: ./openclaw-server
    container_name: clawchat-openclaw-server
    restart: unless-stopped
    command: npx tsx watch src/index.ts
    environment:
      PORT: "3003"
      CONTAINER_SERVER_URL: http://container-server:3002
      OPENCLAW_IMAGE: openclaw-agent:local
      OPENCLAW_NETWORK: clawchat_default
      IM_SERVER_CALLBACK_URL: http://im-server:3000/v1/im/internal/agent-reply
    ports:
      - "3003:3003"
    volumes:
      - ./openclaw-server/src:/app/src

  nanoclaw-server:
    build: ./nanoclaw-server
    container_name: clawchat-nanoclaw-server
    restart: unless-stopped
    command: npx tsx watch src/index.ts
    environment:
      PORT: "3005"
      CONTAINER_SERVER_URL: http://container-server:3002
      NANOCLAW_IMAGE: nanoclaw-agent:local
      NANOCLAW_NETWORK: clawchat_default
      IM_SERVER_CALLBACK_URL: http://im-server:3000/v1/im/internal/agent-reply
    ports:
      - "3005:3005"
    volumes:
      - ./nanoclaw-server/src:/app/src

  ironclaw-server:
    build: ./ironclaw-server
    container_name: clawchat-ironclaw-server
    restart: unless-stopped
    command: npx tsx watch src/index.ts
    environment:
      PORT: "3006"
      CONTAINER_SERVER_URL: http://container-server:3002
      IRONCLAW_IMAGE: ironclaw:local
      IRONCLAW_NETWORK: clawchat_default
      IM_SERVER_CALLBACK_URL: http://im-server:3000/v1/im/internal/agent-reply
    ports:
      - "3006:3006"
    volumes:
      - ./ironclaw-server/src:/app/src

  mcp-server:
    build: ./mcp-server
    container_name: clawchat-mcp-server
    restart: unless-stopped
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./mcp-server/app:/app/app

  # ---- 监控 ----
  loki:
    image: grafana/loki:3.0.0
    container_name: clawchat-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: clawchat-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: clawchat-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    container_name: clawchat-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: clawchat
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3001:3000"
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus

  # ---- 网关 ----
  nginx:
    image: nginx:alpine
    container_name: clawchat-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/build/web:/usr/share/nginx/html:ro

volumes:
  pgdata:
  redisdata:
  loki-data:
  prometheus-data:
  grafana-data:
