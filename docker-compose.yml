# ClawChat 本地开发环境
# 所有服务容器化，源码挂载 + 热重载
# 启动: docker compose up -d
# 日志: docker compose logs -f im-server

services:
  # ---- 基础设施 ----
  postgres:
    image: postgres:17
    container_name: clawchat-postgres
    environment:
      POSTGRES_USER: clawchat
      POSTGRES_PASSWORD: clawchat
      POSTGRES_DB: clawchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawchat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: clawchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- 后端服务（dev 模式：源码挂载 + tsx watch 热重载）----
  im-server:
    build: ./im-server
    container_name: clawchat-im-server
    restart: unless-stopped
    command: sh -c "npx prisma db push && npx tsx watch src/index.ts"
    environment:
      DATABASE_URL: postgresql://clawchat:clawchat@postgres:5432/clawchat
      REDIS_URL: redis://redis:6379
      JWT_SECRET: clawchat-dev-secret
      AGENT_SERVER_URL: http://agent-server:3004
    ports:
      - "3000:3000"
    volumes:
      - ./im-server/src:/app/src
      - ./im-server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-server:
    build: ./agent-server
    container_name: clawchat-agent-server
    restart: unless-stopped
    command: sh -c "npx prisma db push && npx tsx watch src/index.ts"
    environment:
      DATABASE_URL: postgresql://clawchat:clawchat@postgres:5432/clawchat_agent
      IM_SERVER_URL: http://im-server:3000
      OPENCLAW_SERVER_URL: http://openclaw-server:3003
      JWT_SECRET: clawchat-dev-secret
      PORT: "3004"
    ports:
      - "3004:3004"
    volumes:
      - ./agent-server/src:/app/src
      - ./agent-server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy

  container-server:
    build: ./container-server
    container_name: clawchat-container-server
    restart: unless-stopped
    command: npx tsx watch src/index.ts
    environment:
      PORT: "3002"
    ports:
      - "3002:3002"
    volumes:
      - ./container-server/src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock

  openclaw-server:
    build: ./openclaw-server
    container_name: clawchat-openclaw-server
    restart: unless-stopped
    command: npx tsx watch src/index.ts
    environment:
      PORT: "3003"
      CONTAINER_SERVER_URL: http://container-server:3002
      OPENCLAW_IMAGE: openclaw-agent:local
      OPENCLAW_NETWORK: clawchat_default
      IM_SERVER_CALLBACK_URL: http://im-server:3000/v1/im/internal/agent-reply
    ports:
      - "3003:3003"
    volumes:
      - ./openclaw-server/src:/app/src

  mcp-server:
    build: ./mcp-server
    container_name: clawchat-mcp-server
    restart: unless-stopped
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./mcp-server/app:/app/app

  # ---- 网关 ----
  nginx:
    image: nginx:alpine
    container_name: clawchat-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/build/web:/usr/share/nginx/html:ro

volumes:
  pgdata:
  redisdata:
