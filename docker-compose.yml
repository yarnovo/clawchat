# AgentKit 本地开发环境
# 启动: docker compose up -d
# 日志: docker compose logs -f server

services:
  # ---- 基础设施 ----
  postgres:
    image: postgres:17
    container_name: agentkit-postgres
    environment:
      POSTGRES_USER: agentkit
      POSTGRES_PASSWORD: agentkit
      POSTGRES_DB: agentkit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentkit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: agentkit-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ---- AgentKit Server ----
  server:
    build: ./server
    container_name: agentkit-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://agentkit:agentkit@postgres:5432/agentkit
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
