# ClawChat Docker Compose
#
# 本地开发: docker compose up -d            (只启动 postgres + redis)
# 线上部署: docker compose --profile deploy up -d  (启动所有服务 + nginx + 监控)

services:
  # ══════════════════════════════════════════
  # 基础设施（本地开发 + 线上部署 共用）
  # ══════════════════════════════════════════

  postgres:
    image: postgres:17
    container_name: clawchat-postgres
    environment:
      POSTGRES_USER: clawchat
      POSTGRES_PASSWORD: clawchat
      POSTGRES_DB: clawchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawchat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: clawchat-redis
    command: redis-server --save 60 1 --save 300 100
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ══════════════════════════════════════════
  # 应用服务（仅线上部署）
  # ══════════════════════════════════════════

  im-server:
    container_name: clawchat-im-server
    image: registry-vpc.cn-hangzhou.aliyuncs.com/clawchat/im-server:latest
    restart: unless-stopped
    profiles: [deploy]
    environment:
      DATABASE_URL: postgresql://clawchat:clawchat@postgres:5432/clawchat
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-clawchat-prod-secret}
      AGENT_SERVER_URL: http://agent-server:3004
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/v1/im/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent-server:
    container_name: clawchat-agent-server
    image: registry-vpc.cn-hangzhou.aliyuncs.com/clawchat/agent-server:latest
    restart: unless-stopped
    profiles: [deploy]
    environment:
      DATABASE_URL: postgresql://clawchat:clawchat@postgres:5432/clawchat_agent
      IM_SERVER_URL: http://im-server:3000
      OPENCLAW_SERVER_URL: http://openclaw-server:3003
      NANOCLAW_SERVER_URL: http://nanoclaw-server:3005
      IRONCLAW_SERVER_URL: http://ironclaw-server:3006
      JWT_SECRET: ${JWT_SECRET:-clawchat-prod-secret}
      PORT: "3004"
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      im-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/v1/agents/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  container-server:
    container_name: clawchat-container-server
    image: registry-vpc.cn-hangzhou.aliyuncs.com/clawchat/container-server:latest
    restart: unless-stopped
    profiles: [deploy]
    environment:
      PORT: "3002"
    ports:
      - "3002:3002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/v1/containers/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  openclaw-server:
    container_name: clawchat-openclaw-server
    image: registry-vpc.cn-hangzhou.aliyuncs.com/clawchat/openclaw-server:latest
    restart: unless-stopped
    profiles: [deploy]
    environment:
      PORT: "3003"
      CONTAINER_SERVER_URL: http://container-server:3002
      OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-openclaw:local}
      OPENCLAW_NETWORK: clawchat_default
      IM_SERVER_CALLBACK_URL: http://im-server:3000/v1/im/internal/agent-reply
    ports:
      - "3003:3003"
    depends_on:
      container-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/v1/openclaw/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ironclaw-server:
    container_name: clawchat-ironclaw-server
    image: registry-vpc.cn-hangzhou.aliyuncs.com/clawchat/ironclaw-server:latest
    restart: unless-stopped
    profiles: [deploy]
    environment:
      PORT: "3006"
      CONTAINER_SERVER_URL: http://container-server:3002
      IRONCLAW_IMAGE: ${IRONCLAW_IMAGE:-ironclaw:local}
      IRONCLAW_NETWORK: clawchat_default
      IM_SERVER_CALLBACK_URL: http://im-server:3000/v1/im/internal/agent-reply
    ports:
      - "3006:3006"
    depends_on:
      container-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/v1/ironclaw/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp-server:
    container_name: clawchat-mcp-server
    image: registry-vpc.cn-hangzhou.aliyuncs.com/clawchat/mcp-server:latest
    restart: unless-stopped
    profiles: [deploy]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: clawchat-nginx
    restart: unless-stopped
    profiles: [deploy]
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/clawchat/web:/usr/share/nginx/html:ro
    depends_on:
      im-server:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ══════════════════════════════════════════
  # 监控（仅线上部署）
  # ══════════════════════════════════════════

  loki:
    image: grafana/loki:3.0.0
    container_name: clawchat-loki
    restart: unless-stopped
    profiles: [deploy]
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./deploy/monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  promtail:
    image: grafana/promtail:3.0.0
    container_name: clawchat-promtail
    restart: unless-stopped
    profiles: [deploy]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: clawchat-prometheus
    restart: unless-stopped
    profiles: [deploy]
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:11.1.0
    container_name: clawchat-grafana
    restart: unless-stopped
    profiles: [deploy]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-clawchat}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  loki-data:
  prometheus-data:
  grafana-data:
