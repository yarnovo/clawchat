services:
  postgres:
    image: postgres:17
    container_name: clawchat-postgres
    environment:
      POSTGRES_USER: clawchat
      POSTGRES_PASSWORD: clawchat
      POSTGRES_DB: clawchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: clawchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  im-server:
    profiles: [deploy]
    container_name: clawchat-im-server
    build: ./im-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://clawchat:clawchat@postgres:5432/clawchat
      JWT_SECRET: ${JWT_SECRET:-clawchat-prod-secret}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  mcp-server:
    profiles: [deploy]
    container_name: clawchat-mcp-server
    build: ./mcp-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  nginx:
    profiles: [deploy]
    image: nginx:alpine
    container_name: clawchat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/clawchat.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/clawchat/web:/usr/share/nginx/html:ro
    depends_on:
      - im-server
      - mcp-server

volumes:
  pgdata:
  redisdata:
