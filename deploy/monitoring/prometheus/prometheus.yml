global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "im-server"
    static_configs:
      - targets: ["im-server:3000"]
    metrics_path: /v1/im/metrics

  - job_name: "agent-server"
    static_configs:
      - targets: ["agent-server:3004"]
    metrics_path: /v1/agents/metrics

  - job_name: "openclaw-server"
    static_configs:
      - targets: ["openclaw-server:3003"]
    metrics_path: /v1/openclaw/metrics

  - job_name: "container-server"
    static_configs:
      - targets: ["container-server:3002"]
    metrics_path: /v1/containers/metrics
