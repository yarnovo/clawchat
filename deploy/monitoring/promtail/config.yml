server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=clawchat"]
    relabel_configs:
      # Use container name as label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # Use compose service name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      # Try to parse JSON logs (pino/structlog output)
      - json:
          expressions:
            level: level
            msg: msg
            requestId: requestId
            service_name: name
      # Use parsed level as label
      - labels:
          level:
          service_name:
      # Keep original log line as-is
      - output:
          source: msg
