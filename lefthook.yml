pre-commit:
  commands:
    flutter-analyze:
      glob: "app/**/*.dart"
      run: cd app && flutter analyze
    im-server-typecheck:
      glob: "im-server/**/*.ts"
      root: "im-server/"
      run: npx prisma generate && npx tsc --noEmit
    agent-server-typecheck:
      glob: "agent-server/**/*.ts"
      root: "agent-server/"
      run: npx prisma generate && npx tsc --noEmit
    container-server-typecheck:
      glob: "container-server/**/*.ts"
      root: "container-server/"
      run: npx tsc --noEmit
    openclaw-server-typecheck:
      glob: "openclaw-server/**/*.ts"
      root: "openclaw-server/"
      run: npx tsc --noEmit
