name: Release

on:
  push:
    tags: [v*]
  workflow_dispatch:

env:
  ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ACR_NAMESPACE: clawchat

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI checks passed
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            const failed = checks.check_runs.filter(
              c => c.conclusion === 'failure' || c.conclusion === 'cancelled'
            );
            if (failed.length > 0) {
              core.setFailed(`Failed checks: ${failed.map(c => c.name).join(', ')}`);
            }

  build:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # ---- Docker images → ACR ----
      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push im-server
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/im-server:latest \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/im-server:${{ steps.version.outputs.version }} \
                       im-server/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/im-server --all-tags

      - name: Build and push agent-server
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/agent-server:latest \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/agent-server:${{ steps.version.outputs.version }} \
                       agent-server/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/agent-server --all-tags

      - name: Build and push container-server
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/container-server:latest \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/container-server:${{ steps.version.outputs.version }} \
                       container-server/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/container-server --all-tags

      - name: Build and push openclaw-server
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/openclaw-server:latest \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/openclaw-server:${{ steps.version.outputs.version }} \
                       openclaw-server/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/openclaw-server --all-tags

      - name: Build and push ironclaw-server
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ironclaw-server:latest \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ironclaw-server:${{ steps.version.outputs.version }} \
                       ironclaw-server/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/ironclaw-server --all-tags

      - name: Build and push mcp-server
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/mcp-server:latest \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/mcp-server:${{ steps.version.outputs.version }} \
                       mcp-server/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/mcp-server --all-tags

      # ---- Flutter web ----
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        run: cd app && flutter pub get && flutter build web

      # ---- Go CLI ----
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build CLI (linux amd64)
        run: cd cli && GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o clawchat-linux-amd64 .

      - name: Build CLI (darwin arm64)
        run: cd cli && GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o clawchat-darwin-arm64 .

      # ---- Upload artifacts ----
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            app/build/web/
            cli/clawchat-linux-amd64
            cli/clawchat-darwin-arm64

      # ---- GitHub Release (tag only) ----
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            cli/clawchat-linux-amd64
            cli/clawchat-darwin-arm64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare directories
        run: ssh root@${{ secrets.ECS_HOST }} "mkdir -p /opt/clawchat/{cli,web,deploy}"

      - name: Deploy compose and config
        run: |
          scp docker-compose.deploy.yml root@${{ secrets.ECS_HOST }}:/opt/clawchat/docker-compose.yml
          rsync -az deploy/ root@${{ secrets.ECS_HOST }}:/opt/clawchat/deploy/

      - name: Deploy web
        run: rsync -az --delete app/build/web/ root@${{ secrets.ECS_HOST }}:/opt/clawchat/web/

      - name: Deploy CLI
        run: |
          scp cli/clawchat-linux-amd64 root@${{ secrets.ECS_HOST }}:/opt/clawchat/cli/clawchat
          ssh root@${{ secrets.ECS_HOST }} "chmod +x /opt/clawchat/cli/clawchat && ln -sf /opt/clawchat/cli/clawchat /usr/local/bin/clawchat"

      - name: Pull and start services
        run: |
          ssh root@${{ secrets.ECS_HOST }} "cd /opt/clawchat && docker compose pull && docker compose up -d --remove-orphans"

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://${{ secrets.ECS_HOST }}/v1/im/health > /dev/null 2>&1; then
              echo "Services are healthy"
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 5
          done
          echo "Services did not become healthy"
          exit 1

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run smoke tests
        env:
          BASE_URL: http://${{ secrets.ECS_HOST }}
          CI: "true"
        run: cd e2e && npx playwright test tests/smoke.spec.ts

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-results
          path: e2e/test-results/
