name: Container Server CI

on:
  push:
    paths: [container-server/**]
  pull_request:
    paths: [container-server/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: container-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: container-server/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
