name: IM Server CI

on:
  push:
    paths: [im-server/**]
  pull_request:
    paths: [im-server/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: im-server

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: clawchat
          POSTGRES_PASSWORD: clawchat
          POSTGRES_DB: clawchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clawchat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clawchat:clawchat@localhost:5432/clawchat
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npx tsc --noEmit
      - run: npm test
