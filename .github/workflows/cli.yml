name: CLI CI

on:
  push:
    paths: [cli/**]
  pull_request:
    paths: [cli/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - run: go vet ./...
      - run: go build -o clawchat .
      - run: go test ./...
