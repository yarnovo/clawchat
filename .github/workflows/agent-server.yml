name: Agent Server CI

on:
  push:
    paths: [agent-server/**]
  pull_request:
    paths: [agent-server/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-server

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: clawchat
          POSTGRES_PASSWORD: clawchat
          POSTGRES_DB: clawchat_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clawchat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clawchat:clawchat@localhost:5432/clawchat_agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-server/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npm test
