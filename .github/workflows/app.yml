name: App CI

on:
  push:
    paths: [app/**]
  pull_request:
    paths: [app/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --exclude-tags golden
      - run: flutter build web
