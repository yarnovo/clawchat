name: MCP Server CI

on:
  push:
    paths: [mcp-server/**]
  pull_request:
    paths: [mcp-server/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest
